<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>PDF 知识库</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    padding: 24px;
}
h1 {
    font-size: 22px;
    margin-bottom: 20px;
    color: #e8e8e8;
    display: flex;
    align-items: center;
    gap: 10px;
}
h1 .icon { font-size: 26px; }
.subtitle {
    font-size: 13px;
    color: #888;
    font-weight: normal;
    margin-left: 8px;
}

/* 空状态 */
.empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #999;
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 15px; }

/* PDF 卡片网格 */
.pdf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
}
.pdf-card {
    background: #1a1a1a;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    position: relative;
}
.pdf-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    transform: translateY(-2px);
}

/* 缩略图区域 */
.pdf-thumb {
    width: 100%;
    aspect-ratio: 3/4;
    background: #252525;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}
.pdf-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.pdf-thumb .no-thumb {
    font-size: 48px;
    color: #666;
}

/* 页数角标 */
.page-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
}

/* 信息区域 */
.pdf-info {
    padding: 14px 16px;
}
.pdf-filename {
    font-size: 14px;
    font-weight: 600;
    color: #e8e8e8;
    margin-bottom: 6px;
    word-break: break-all;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.pdf-meta {
    font-size: 12px;
    color: #999;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* 删除按钮 */
.btn-delete {
    background: none;
    border: 1px solid #2a2a2a;
    color: #999;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}
.btn-delete:hover {
    border-color: #e74c3c;
    color: #e74c3c;
    background: #2a1515;
}

/* 删除确认弹窗 */
.modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
}
.modal-overlay.active { display: flex; }
.modal-box {
    background: #1a1a1a;
    border-radius: 14px;
    padding: 28px 32px;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    text-align: center;
    border: 1px solid #2a2a2a;
}
.modal-box h3 {
    font-size: 17px;
    margin-bottom: 10px;
    color: #e8e8e8;
}
.modal-box p {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
    line-height: 1.5;
}
.modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
}
.modal-actions button {
    padding: 8px 24px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
}
.btn-cancel {
    background: #252525;
    color: #e8e8e8;
}
.btn-cancel:hover { background: #2a2a2a; }
.btn-confirm-delete {
    background: #e74c3c;
    color: #fff;
}
.btn-confirm-delete:hover { background: #c0392b; }

/* 加载状态 */
.loading {
    text-align: center;
    padding: 60px;
    color: #999;
    font-size: 14px;
}
</style>
</head>
<body>

<h1>
    <span class="icon">📚</span>
    PDF 知识库
    <span class="subtitle" id="docCount"></span>
</h1>

<div id="loading" class="loading">加载中...</div>
<div id="emptyState" class="empty-state" style="display:none">
    <div class="icon">📄</div>
    <p>暂无 PDF 文档</p>
</div>
<div id="pdfGrid" class="pdf-grid"></div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-box">
        <h3>确认删除</h3>
        <p id="deleteMsg">确定要删除此文档吗？<br>将同时清除所有页面图片和数据库记录，此操作不可撤销。</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
            <button class="btn-confirm-delete" id="btnConfirmDel" onclick="confirmDelete()">删除</button>
        </div>
    </div>
</div>

<script>
let pendingDeleteId = null;

async function loadPdfs() {
    const loading = document.getElementById('loading');
    const emptyState = document.getElementById('emptyState');
    const grid = document.getElementById('pdfGrid');
    const docCount = document.getElementById('docCount');

    try {
        const resp = await fetch('/api/pdfs');
        const data = await resp.json();
        const pdfs = data.pdfs || [];

        loading.style.display = 'none';

        if (pdfs.length === 0) {
            emptyState.style.display = '';
            grid.innerHTML = '';
            docCount.textContent = '';
            return;
        }

        emptyState.style.display = 'none';
        docCount.textContent = `共 ${pdfs.length} 个文档`;

        grid.innerHTML = pdfs.map(pdf => {
            const thumbSrc = pdf.thumbnail
                ? `/api/pdf_image?path=${encodeURIComponent(pdf.thumbnail)}`
                : '';
            const thumbHtml = thumbSrc
                ? `<img src="${thumbSrc}" alt="缩略图" loading="lazy">`
                : `<span class="no-thumb">📄</span>`;
            const date = pdf.created_at
                ? new Date(pdf.created_at).toLocaleDateString('zh-CN')
                : '';
            return `
                <div class="pdf-card" data-id="${pdf.pdf_id}">
                    <div class="pdf-thumb">
                        ${thumbHtml}
                        <span class="page-badge">${pdf.page_count} 页</span>
                    </div>
                    <div class="pdf-info">
                        <div class="pdf-filename" title="${escapeHtml(pdf.filename)}">${escapeHtml(pdf.filename)}</div>
                        <div class="pdf-meta">
                            <span>${date}</span>
                            <button class="btn-delete" onclick="showDeleteModal('${pdf.pdf_id}', '${escapeHtml(pdf.filename)}')">删除</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

    } catch (err) {
        loading.textContent = '加载失败: ' + err.message;
    }
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function showDeleteModal(pdfId, filename) {
    pendingDeleteId = pdfId;
    document.getElementById('deleteMsg').innerHTML =
        `确定要删除 <b>${filename}</b> 吗？<br>将同时清除所有页面图片和数据库记录，此操作不可撤销。`;
    document.getElementById('deleteModal').classList.add('active');
}

function closeDeleteModal() {
    pendingDeleteId = null;
    document.getElementById('deleteModal').classList.remove('active');
}

async function confirmDelete() {
    if (!pendingDeleteId) return;
    const btn = document.getElementById('btnConfirmDel');
    btn.textContent = '删除中...';
    btn.disabled = true;

    try {
        const resp = await fetch(`/api/pdfs/${pendingDeleteId}`, { method: 'DELETE' });
        const data = await resp.json();
        if (data.ok) {
            closeDeleteModal();
            loadPdfs();  // 刷新列表
        } else {
            alert('删除失败: ' + (data.error || '未知错误'));
        }
    } catch (err) {
        alert('删除失败: ' + err.message);
    } finally {
        btn.textContent = '删除';
        btn.disabled = false;
    }
}

// 点击遮罩关闭弹窗
document.getElementById('deleteModal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
});

// 初始加载
loadPdfs();
</script>
</body>
</html>
