<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 用量统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-primary: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #252525;
  --text-primary: #e8e8e8;
  --text-secondary: #999;
  --text-muted: #666;
  --border-color: #2a2a2a;
  --accent: #6c8aff;
  --input-token-color: #6c8aff;
  --output-token-color: #f472b6;
  --time-color: #34d399;
}
html, body { height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg-primary); color:var(--text-primary); }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

.page-header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
  position: sticky; top: 0; z-index: 10;
}
.page-header h1 { font-size: 20px; font-weight: 600; display:flex; align-items:center; gap:10px; }
.page-header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

.stats-summary {
  display: flex; gap: 24px; padding: 20px 32px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
}
.stat-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 14px 20px;
  min-width: 160px;
}
.stat-card .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: .6px; margin-bottom: 4px; }
.stat-card .value { font-size: 22px; font-weight: 700; }
.stat-card .value.input { color: var(--input-token-color); }
.stat-card .value.output { color: var(--output-token-color); }
.stat-card .value.time { color: var(--time-color); }
.stat-card .value.total { color: var(--text-primary); }

.content { padding: 24px 32px; }

.qa-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}
.qa-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-tertiary);
}
.qa-header .qa-title { font-size: 14px; font-weight: 600; display:flex; align-items:center; gap:8px; }
.qa-header .qa-title .qa-num { color: var(--accent); }
.qa-header .qa-meta { font-size: 12px; color: var(--text-muted); display:flex; gap:16px; }
.qa-header .qa-meta span { display:flex; align-items:center; gap:4px; }

.qa-body { padding: 16px 20px; }
.chart-container { position: relative; width: 100%; }

.legend-bar {
  display: flex; gap: 20px; padding: 16px 32px 0;
  font-size: 13px; color: var(--text-secondary);
}
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot { width:12px; height:12px; border-radius:3px; }
</style>
</head>
<body>

<div class="page-header">
  <h1>📊 Token 用量统计</h1>
  <div class="subtitle">当前会话的每次 QA 迭代详情</div>
</div>

<div class="stats-summary" id="statsSummary"></div>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:var(--input-token-color)"></div> 输入 Tokens</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--output-token-color)"></div> 输出 Tokens</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--time-color)"></div> 耗时 (秒)</div>
</div>

<div class="content" id="qaContent"></div>

<script>
// ===== 假数据 =====
const mockData = [
  {
    id: 1,
    question: "帮我写一个Python爬虫抓取新闻标题",
    iterations: [
      { round: 1, input_tokens: 1250, output_tokens: 860, time_sec: 3.2 },
      { round: 2, input_tokens: 2100, output_tokens: 1540, time_sec: 5.8 },
      { round: 3, input_tokens: 2800, output_tokens: 420, time_sec: 2.1 },
    ]
  },
  {
    id: 2,
    question: "搜索最新的AI论文并总结",
    iterations: [
      { round: 1, input_tokens: 980, output_tokens: 650, time_sec: 2.5 },
      { round: 2, input_tokens: 3200, output_tokens: 2100, time_sec: 8.4 },
      { round: 3, input_tokens: 4100, output_tokens: 1800, time_sec: 7.2 },
      { round: 4, input_tokens: 4500, output_tokens: 3200, time_sec: 12.1 },
      { round: 5, input_tokens: 5000, output_tokens: 980, time_sec: 4.3 },
    ]
  },
  {
    id: 3,
    question: "修复项目中的内存泄漏问题",
    iterations: [
      { round: 1, input_tokens: 1800, output_tokens: 1200, time_sec: 4.6 },
      { round: 2, input_tokens: 3500, output_tokens: 2800, time_sec: 9.8 },
    ]
  },
  {
    id: 4,
    question: "把这段代码重构成TypeScript并添加类型定义",
    iterations: [
      { round: 1, input_tokens: 2200, output_tokens: 1900, time_sec: 6.3 },
      { round: 2, input_tokens: 3100, output_tokens: 2400, time_sec: 8.1 },
      { round: 3, input_tokens: 3800, output_tokens: 1600, time_sec: 5.9 },
      { round: 4, input_tokens: 4200, output_tokens: 800, time_sec: 3.2 },
    ]
  },
  {
    id: 5,
    question: "分析服务器日志找出502错误的原因",
    iterations: [
      { round: 1, input_tokens: 1500, output_tokens: 900, time_sec: 3.8 },
      { round: 2, input_tokens: 2800, output_tokens: 2200, time_sec: 7.5 },
      { round: 3, input_tokens: 5200, output_tokens: 3800, time_sec: 14.2 },
      { round: 4, input_tokens: 5800, output_tokens: 1200, time_sec: 5.1 },
      { round: 5, input_tokens: 6100, output_tokens: 2600, time_sec: 9.8 },
      { round: 6, input_tokens: 6500, output_tokens: 600, time_sec: 2.9 },
    ]
  }
];

// ===== 汇总统计 =====
let totalInput = 0, totalOutput = 0, totalTime = 0, totalRounds = 0;
mockData.forEach(qa => {
  qa.iterations.forEach(it => {
    totalInput += it.input_tokens;
    totalOutput += it.output_tokens;
    totalTime += it.time_sec;
    totalRounds++;
  });
});

document.getElementById('statsSummary').innerHTML = `
  <div class="stat-card"><div class="label">总 QA 次数</div><div class="value total">${mockData.length}</div></div>
  <div class="stat-card"><div class="label">总迭代轮数</div><div class="value total">${totalRounds}</div></div>
  <div class="stat-card"><div class="label">总输入 Tokens</div><div class="value input">${totalInput.toLocaleString()}</div></div>
  <div class="stat-card"><div class="label">总输出 Tokens</div><div class="value output">${totalOutput.toLocaleString()}</div></div>
  <div class="stat-card"><div class="label">总耗时</div><div class="value time">${totalTime.toFixed(1)}s</div></div>
`;

// ===== 渲染每个 QA =====
const content = document.getElementById('qaContent');

mockData.forEach((qa, idx) => {
  const qaInput = qa.iterations.reduce((s, i) => s + i.input_tokens, 0);
  const qaOutput = qa.iterations.reduce((s, i) => s + i.output_tokens, 0);
  const qaTime = qa.iterations.reduce((s, i) => s + i.time_sec, 0);

  const section = document.createElement('div');
  section.className = 'qa-section';
  section.innerHTML = `
    <div class="qa-header">
      <div class="qa-title"><span class="qa-num">Q${qa.id}</span> ${qa.question}</div>
      <div class="qa-meta">
        <span>🔄 ${qa.iterations.length} 轮</span>
        <span style="color:var(--input-token-color)">↓${qaInput.toLocaleString()}</span>
        <span style="color:var(--output-token-color)">↑${qaOutput.toLocaleString()}</span>
        <span style="color:var(--time-color)">⏱${qaTime.toFixed(1)}s</span>
      </div>
    </div>
    <div class="qa-body">
      <div class="chart-container"><canvas id="chart-${idx}"></canvas></div>
    </div>
  `;
  content.appendChild(section);

  // 绘制图表
  const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
  const labels = qa.iterations.map(i => `第${i.round}轮`);
  const maxToken = Math.max(...qa.iterations.flatMap(i => [i.input_tokens, i.output_tokens]));

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '输入 Tokens',
          data: qa.iterations.map(i => i.input_tokens),
          backgroundColor: 'rgba(108,138,255,0.8)',
          borderColor: 'rgba(108,138,255,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: '输出 Tokens',
          data: qa.iterations.map(i => i.output_tokens),
          backgroundColor: 'rgba(244,114,182,0.8)',
          borderColor: 'rgba(244,114,182,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: '耗时 (秒)',
          data: qa.iterations.map(i => i.time_sec),
          backgroundColor: 'rgba(52,211,153,0.8)',
          borderColor: 'rgba(52,211,153,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y1',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: qa.iterations.length <= 3 ? 4 : 3,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#e8e8e8',
          bodyColor: '#999',
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) {
              if (ctx.dataset.yAxisID === 'y1') return ` ${ctx.dataset.label}: ${ctx.raw}s`;
              return ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { color: '#666', font: { size: 12 } }
        },
        y: {
          position: 'left',
          title: { display: true, text: 'Tokens', color: '#666', font: { size: 11 } },
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { color: '#666', font: { size: 11 } },
          beginAtZero: true,
        },
        y1: {
          position: 'right',
          title: { display: true, text: '秒', color: '#666', font: { size: 11 } },
          grid: { drawOnChartArea: false },
          ticks: { color: 'rgba(52,211,153,.7)', font: { size: 11 } },
          beginAtZero: true,
        }
      }
    }
  });
});
</script>
</body>
</html>
