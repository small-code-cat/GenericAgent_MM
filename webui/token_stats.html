<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token 用量统计</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-primary: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #252525;
  --text-primary: #e8e8e8;
  --text-secondary: #999;
  --text-muted: #666;
  --border-color: #2a2a2a;
  --accent: #6c8aff;
  --input-token-color: #6c8aff;
  --output-token-color: #f472b6;
  --time-color: #34d399;
}
html, body { height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:var(--bg-primary); color:var(--text-primary); }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#333; border-radius:3px; }

.page-header {
  padding: 24px 32px 16px;
  border-bottom: 1px solid var(--border-color);
  background: var(--bg-secondary);
  position: sticky; top: 0; z-index: 10;
}
.page-header h1 { font-size: 20px; font-weight: 600; display:flex; align-items:center; gap:10px; }
.page-header .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 6px; }

.stat-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 14px 20px;
  min-width: 160px;
}
.stat-card .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: .6px; margin-bottom: 4px; }
.stat-card .value { font-size: 22px; font-weight: 700; }
.stat-card .value.input { color: var(--input-token-color); }
.stat-card .value.output { color: var(--output-token-color); }
.stat-card .value.time { color: var(--time-color); }
.stat-card .value.total { color: var(--text-primary); }

.content { padding: 24px 32px; }

.qa-section {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 20px;
  overflow: hidden;
}
.qa-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-color);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-tertiary);
}
.qa-header .qa-title { font-size: 14px; font-weight: 600; display:flex; align-items:center; gap:8px; }
.qa-header .qa-title .qa-num { color: var(--accent); }
.qa-header .qa-meta { font-size: 12px; color: var(--text-muted); display:flex; gap:16px; }
.qa-header .qa-meta span { display:flex; align-items:center; gap:4px; }

.qa-body { padding: 16px 20px; }
.chart-container { position: relative; width: 100%; }

.legend-bar {
  display: flex; gap: 20px; padding: 16px 32px 0;
  font-size: 13px; color: var(--text-secondary);
}
.legend-item { display:flex; align-items:center; gap:6px; }
.legend-dot { width:12px; height:12px; border-radius:3px; }

.qa-stats {
  display: flex; gap: 16px; padding: 0 0 14px;
  border-bottom: 1px solid var(--border-color);
  margin-bottom: 14px;
}
.qa-stats .stat-card { flex: 1; padding: 10px 16px; min-width: 0; }
.qa-stats .stat-card .value { font-size: 18px; }

.text-modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.6); z-index:100; justify-content:center; align-items:center;
}
.text-modal-overlay.active { display:flex; }
.text-modal {
  background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px;
  width:80%; max-width:800px; max-height:80vh; display:flex; flex-direction:column;
}
.text-modal-header {
  padding:14px 20px; border-bottom:1px solid var(--border-color); display:flex;
  justify-content:space-between; align-items:center; background:var(--bg-tertiary); border-radius:12px 12px 0 0;
}
.text-modal-header h3 { font-size:15px; margin:0; }
.text-modal-close { background:none; border:none; color:var(--text-muted); font-size:20px; cursor:pointer; padding:0 4px; }
.text-modal-close:hover { color:var(--text-primary); }
.text-modal-body { padding:16px 20px; overflow-y:auto; flex:1; }
.text-modal-body .text-block { margin-bottom:16px; }
.text-modal-body .text-label { font-size:12px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
.text-modal-body pre {
  background:var(--bg-tertiary); border:1px solid var(--border-color); border-radius:8px;
  padding:12px; font-size:12px; line-height:1.6; white-space:pre-wrap; word-break:break-all;
  color:var(--text-secondary); max-height:35vh; overflow-y:auto;
}
</style>
</head>
<body>

<div class="text-modal-overlay" id="textModal" onclick="if(event.target===this)this.classList.remove('active')">
  <div class="text-modal">
    <div class="text-modal-header">
      <h3 id="modalTitle">迭代详情</h3>
      <button class="text-modal-close" onclick="document.getElementById('textModal').classList.remove('active')">&times;</button>
    </div>
    <div class="text-modal-body" id="modalBody"></div>
  </div>
</div>

<div class="page-header">
  <h1>📊 Token 用量统计</h1>
  <div style="display:flex;align-items:center;gap:16px;margin-top:8px;flex-wrap:wrap;">
    <div class="subtitle">每次 QA 迭代详情</div>
    <select id="fileSelect" style="background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:6px;padding:5px 10px;font-size:13px;cursor:pointer;max-width:360px;">
      <option value="">当前会话</option>
    </select>
  </div>
</div>

<div class="legend-bar">
  <div class="legend-item"><div class="legend-dot" style="background:var(--input-token-color)"></div> 输入 Tokens</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--output-token-color)"></div> 输出 Tokens</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--time-color)"></div> 耗时 (秒)</div>
</div>

<div class="content" id="qaContent"></div>

<script>
// ===== 从后端 API 加载真实数据 =====
const content = document.getElementById('qaContent');

async function loadFileList() {
  try {
    const res = await fetch('/api/list_jsonl');
    const info = await res.json();
    const sel = document.getElementById('fileSelect');
    sel.innerHTML = '<option value="">当前会话</option>';
    (info.files || []).forEach(f => {
      const opt = document.createElement('option');
      opt.value = f.name;
      opt.textContent = `${f.name} (${f.size_kb}KB)${f.is_current ? ' ★' : ''}`;
      sel.appendChild(opt);
    });
  } catch(e) { console.warn('加载文件列表失败', e); }
}

document.getElementById('fileSelect').addEventListener('change', function() {
  loadAndRender(this.value);
});

async function loadAndRender(file) {
  // 清理旧内容
  content.innerHTML = '';
  const oldSummary = document.querySelector('.summary-bar');
  if (oldSummary) oldSummary.remove();

  const url = file ? `/api/token_stats?file=${encodeURIComponent(file)}` : '/api/token_stats';
  let data;
  try {
    const resp = await fetch(url);
    data = await resp.json();
  } catch (e) {
    content.innerHTML = '<div style="text-align:center;padding:60px 0;color:#666;">⚠️ 无法连接后端 API</div>';
    return;
  }
  if (!data || data.length === 0) {
    content.innerHTML = '<div style="text-align:center;padding:60px 0;color:#666;">暂无数据，开始对话后将自动记录</div>';
    return;
  }

  // 渲染全局汇总
  const totalInput = data.reduce((s, q) => s + q.iterations.reduce((a, i) => a + i.input_tokens, 0), 0);
  const totalOutput = data.reduce((s, q) => s + q.iterations.reduce((a, i) => a + i.output_tokens, 0), 0);
  const totalTime = data.reduce((s, q) => s + q.iterations.reduce((a, i) => a + i.time_sec, 0), 0);
  const totalRounds = data.reduce((s, q) => s + q.iterations.length, 0);
  const header = document.querySelector('.page-header');
  const summaryDiv = document.createElement('div');
  summaryDiv.className = 'summary-bar';
  summaryDiv.style.cssText = 'display:flex;gap:24px;justify-content:center;padding:12px 32px 0;flex-wrap:wrap;';
  summaryDiv.innerHTML = `
    <div class="stat-card"><div class="label">QA 总数</div><div class="value total">${data.length}</div></div>
    <div class="stat-card"><div class="label">总迭代</div><div class="value total">${totalRounds}</div></div>
    <div class="stat-card"><div class="label">总输入 Tokens</div><div class="value input">${totalInput.toLocaleString()}</div></div>
    <div class="stat-card"><div class="label">总输出 Tokens</div><div class="value output">${totalOutput.toLocaleString()}</div></div>
    <div class="stat-card"><div class="label">总耗时</div><div class="value time">${totalTime.toFixed(1)}s</div></div>
  `;
  header.after(summaryDiv);

  data.forEach((qa, idx) => {
  const qaInput = qa.iterations.reduce((s, i) => s + i.input_tokens, 0);
  const qaOutput = qa.iterations.reduce((s, i) => s + i.output_tokens, 0);
  const qaTime = qa.iterations.reduce((s, i) => s + i.time_sec, 0);

  const section = document.createElement('div');
  section.className = 'qa-section';
  section.innerHTML = `
    <div class="qa-header">
      <div class="qa-title"><span class="qa-num">Q${qa.id}</span> ${qa.question}</div>
    </div>
    <div class="qa-body">
      <div class="qa-stats">
        <div class="stat-card"><div class="label">迭代轮数</div><div class="value total">${qa.iterations.length}</div></div>
        <div class="stat-card"><div class="label">输入 Tokens</div><div class="value input">${qaInput.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">输出 Tokens</div><div class="value output">${qaOutput.toLocaleString()}</div></div>
        <div class="stat-card"><div class="label">耗时</div><div class="value time">${qaTime.toFixed(1)}s</div></div>
      </div>
      <div class="chart-container"><canvas id="chart-${idx}"></canvas></div>
    </div>
  `;
  content.appendChild(section);

  // 绘制图表
  const ctx = document.getElementById(`chart-${idx}`).getContext('2d');
  const labels = qa.iterations.map(i => `第${i.round}轮`);
  const maxToken = Math.max(...qa.iterations.flatMap(i => [i.input_tokens, i.output_tokens]));

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '输入 Tokens',
          data: qa.iterations.map(i => i.input_tokens),
          backgroundColor: 'rgba(108,138,255,0.8)',
          borderColor: 'rgba(108,138,255,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: '输出 Tokens',
          data: qa.iterations.map(i => i.output_tokens),
          backgroundColor: 'rgba(244,114,182,0.8)',
          borderColor: 'rgba(244,114,182,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y',
        },
        {
          label: '耗时 (秒)',
          data: qa.iterations.map(i => i.time_sec),
          backgroundColor: 'rgba(52,211,153,0.8)',
          borderColor: 'rgba(52,211,153,1)',
          borderWidth: 1,
          borderRadius: 4,
          yAxisID: 'y1',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: qa.iterations.length <= 3 ? 4 : 3,
      interaction: { mode: 'index', intersect: false },
      onClick: function(evt, elements) {
        if (!elements.length) return;
        const di = elements[0].index;
        const iter = qa.iterations[di];
        document.getElementById('modalTitle').textContent = `Q${qa.id} - 第${iter.round}轮 迭代详情`;
        let html = '';
        if (iter.input_text) {
          html += `<div class="text-block"><div class="text-label">📥 输入文本</div><pre>${iter.input_text.replace(/</g,'&lt;')}</pre></div>`;
        }
        if (iter.output_text) {
          html += `<div class="text-block"><div class="text-label">📤 输出文本</div><pre>${iter.output_text.replace(/</g,'&lt;')}</pre></div>`;
        }
        if (!html) html = '<div style="color:#666;padding:20px;">该迭代无文本数据</div>';
        document.getElementById('modalBody').innerHTML = html;
        document.getElementById('textModal').classList.add('active');
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#2a2a2a',
          borderWidth: 1,
          titleColor: '#e8e8e8',
          bodyColor: '#999',
          footerColor: '#666',
          padding: 12,
          cornerRadius: 8,
          bodyFont: { size: 12 },
          footerFont: { size: 10, style: 'italic' },
          callbacks: {
            label: function(ctx) {
              if (ctx.dataset.yAxisID === 'y1') return ` ${ctx.dataset.label}: ${ctx.raw}s`;
              return ` ${ctx.dataset.label}: ${ctx.raw.toLocaleString()}`;
            },
            afterBody: function(tooltipItems) {
              const di = tooltipItems[0].dataIndex;
              const iter = qa.iterations[di];
              const lines = [''];
              if (iter.input_text) {
                const t = iter.input_text.length > 150 ? iter.input_text.slice(0, 150) + '…' : iter.input_text;
                lines.push('📥 输入: ' + t.replace(/\n/g, ' '));
              }
              if (iter.output_text) {
                const t = iter.output_text.length > 150 ? iter.output_text.slice(0, 150) + '…' : iter.output_text;
                lines.push('📤 输出: ' + t.replace(/\n/g, ' '));
              }
              if (iter.input_text || iter.output_text) lines.push('\n🖱 点击柱形查看完整文本');
              return lines;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { color: '#666', font: { size: 12 } }
        },
        y: {
          position: 'left',
          title: { display: true, text: 'Tokens', color: '#666', font: { size: 11 } },
          grid: { color: 'rgba(255,255,255,.05)' },
          ticks: { color: '#666', font: { size: 11 } },
          beginAtZero: true,
        },
        y1: {
          position: 'right',
          title: { display: true, text: '秒', color: '#666', font: { size: 11 } },
          grid: { drawOnChartArea: false },
          ticks: { color: 'rgba(52,211,153,.7)', font: { size: 11 } },
          beginAtZero: true,
        }
      }
    }
  });
  });
}

loadFileList();
loadAndRender();
</script>
</body>
</html>
