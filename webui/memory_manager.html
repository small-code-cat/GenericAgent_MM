<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 多模态记忆库</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1b23;
  --surface2: #24252f;
  --border: #2d2e3a;
  --text: #e4e4e7;
  --text-secondary: #9ca3af;
  --accent: #818cf8;
  --accent-hover: #6366f1;
  --danger: #ef4444;
  --danger-hover: #dc2626;
  --success: #10b981;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 {
  font-size: 1.3em;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-actions {
  display: flex;
  gap: 12px;
  align-items: center;
}
.stats {
  font-size: .85em;
  color: var(--text-secondary);
}
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  font-size: .85em;
  transition: all .2s;
}
.btn:hover { background: var(--border); }
.btn-danger { border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: rgba(239,68,68,.15); }

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-secondary);
}
.empty .icon { font-size: 3em; margin-bottom: 16px; }
.empty p { font-size: 1.1em; }

/* Loading */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-secondary);
}
.loading .spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Memory Card */
.memory-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
  transition: border-color .2s;
}
.memory-card:hover { border-color: var(--accent); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: var(--surface2);
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: .75em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .04em;
}
.badge-type {
  background: rgba(129,140,248,.15);
  color: var(--accent);
}
.card-time {
  font-size: .8em;
  color: var(--text-secondary);
}
.card-id {
  font-size: .7em;
  color: var(--text-secondary);
  font-family: 'SF Mono', 'Fira Code', monospace;
  opacity: .6;
}

.delete-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: .8em;
  transition: all .2s;
}
.delete-btn:hover {
  border-color: var(--danger);
  color: var(--danger);
  background: rgba(239,68,68,.1);
}

.card-body {
  padding: 16px 18px;
  display: flex;
  gap: 18px;
}

/* Image thumbnail */
.card-image {
  flex-shrink: 0;
  width: 140px;
  height: 140px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
}
.card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .3s;
}
.card-image:hover img { transform: scale(1.05); }
.card-image .no-img {
  color: var(--text-secondary);
  font-size: .8em;
  text-align: center;
  padding: 10px;
}

/* Text content */
.card-content {
  flex: 1;
  min-width: 0;
}
.content-section {
  margin-bottom: 12px;
}
.content-section:last-child { margin-bottom: 0; }
.content-label {
  font-size: .7em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--accent);
  margin-bottom: 4px;
  opacity: .7;
}
.content-text {
  font-size: .9em;
  line-height: 1.6;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
}
.content-text.secondary {
  color: var(--text-secondary);
  font-size: .85em;
}

/* Image modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.85);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.modal-overlay.active { display: flex; }
.modal-overlay img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 8px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
}

/* Confirm dialog */
.confirm-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.6);
  z-index: 1001;
  align-items: center;
  justify-content: center;
}
.confirm-overlay.active { display: flex; }
.confirm-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 24px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}
.confirm-box h3 { margin-bottom: 12px; font-size: 1.1em; }
.confirm-box p { color: var(--text-secondary); font-size: .9em; margin-bottom: 20px; }
.confirm-actions { display: flex; gap: 12px; justify-content: center; }
.confirm-actions .btn { min-width: 100px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: .9em;
  z-index: 2000;
  animation: slideIn .3s ease;
  transition: opacity .3s;
}
.toast.success { background: rgba(16,185,129,.9); color: #fff; }
.toast.error { background: rgba(239,68,68,.9); color: #fff; }
@keyframes slideIn { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

/* Responsive */
@media (max-width: 640px) {
  .container { padding: 12px; }
  .card-body { flex-direction: column; }
  .card-image { width: 100%; height: 200px; }
  .header { padding: 12px 16px; }
  .header h1 { font-size: 1.1em; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🧠 多模态记忆库</h1>
  <div class="header-actions">
    <span class="stats" id="stats"></span>
    <button class="btn" onclick="loadMemories()">🔄 刷新</button>
  </div>
</div>

<div class="container" id="container">
  <div class="loading" id="loadingState">
    <div class="spinner"></div>
    <p>加载记忆数据...</p>
  </div>
</div>

<!-- Image Modal -->
<div class="modal-overlay" id="imageModal" onclick="closeModal()">
  <img id="modalImage" src="" alt="">
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <h3>⚠️ 确认删除</h3>
    <p id="confirmMsg">确定要删除这条记忆吗？此操作不可撤销。</p>
    <div class="confirm-actions">
      <button class="btn" onclick="closeConfirm()">取消</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="confirmDelete()">删除</button>
    </div>
  </div>
</div>

<script>
let allGroups = [];
let pendingDeleteId = null;

async function loadMemories() {
  const container = document.getElementById('container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载记忆数据...</p></div>';

  try {
    const resp = await fetch('/api/memories');
    const data = await resp.json();
    allGroups = data.groups || [];
    renderGroups();
  } catch (e) {
    container.innerHTML = `<div class="empty"><div class="icon">❌</div><p>加载失败: ${e.message}</p></div>`;
  }
}

function renderGroups() {
  const container = document.getElementById('container');
  const stats = document.getElementById('stats');

  if (allGroups.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📭</div><p>记忆库为空</p></div>';
    stats.textContent = '共 0 条记忆';
    return;
  }

  stats.textContent = `共 ${allGroups.length} 组记忆`;
  let html = '';

  for (const g of allGroups) {
    const hasImage = !!g.image_path;
    const imgSrc = hasImage ? `/api/memory_image?path=${encodeURIComponent(g.image_path)}` : '';
    const time = g.created_at ? new Date(g.created_at).toLocaleString('zh-CN') : '未知';

    html += `
    <div class="memory-card" data-gid="${g.group_id}">
      <div class="card-header">
        <div class="card-meta">
          <span class="badge badge-type">${escHtml(g.source_type || 'mixed')}</span>
          <span class="card-time">📅 ${escHtml(time)}</span>
          <span class="card-id">ID: ${escHtml(g.group_id.substring(0, 8))}…</span>
        </div>
        <button class="delete-btn" onclick="askDelete('${escAttr(g.group_id)}')">🗑️ 删除</button>
      </div>
      <div class="card-body">
        ${hasImage ? `
        <div class="card-image" onclick="showImage('${escAttr(imgSrc)}')">
          <img src="${escAttr(imgSrc)}" alt="记忆图片" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-img\\'>图片加载失败</div>'">
        </div>` : ''}
        <div class="card-content">
          ${g.knowledge ? `
          <div class="content-section">
            <div class="content-label">💡 知识提取</div>
            <div class="content-text">${escHtml(g.knowledge)}</div>
          </div>` : ''}
          ${g.source_text ? `
          <div class="content-section">
            <div class="content-label">📝 原始文本</div>
            <div class="content-text secondary">${escHtml(g.source_text)}</div>
          </div>` : ''}
          ${g.image_desc ? `
          <div class="content-section">
            <div class="content-label">🖼️ 图片描述</div>
            <div class="content-text secondary">${escHtml(g.image_desc)}</div>
          </div>` : ''}
        </div>
      </div>
    </div>`;
  }

  container.innerHTML = html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
function escAttr(s) {
  return s.replace(/'/g, "\\'").replace(/"/g, '&quot;');
}

function showImage(src) {
  document.getElementById('modalImage').src = src;
  document.getElementById('imageModal').classList.add('active');
}
function closeModal() {
  document.getElementById('imageModal').classList.remove('active');
}

function askDelete(groupId) {
  pendingDeleteId = groupId;
  document.getElementById('confirmMsg').textContent = `确定要删除这组记忆吗？(ID: ${groupId.substring(0, 8)}…) 此操作不可撤销，关联的图片文件也会被删除。`;
  document.getElementById('confirmDialog').classList.add('active');
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmDialog').classList.remove('active');
}
async function confirmDelete() {
  if (!pendingDeleteId) return;
  const gid = pendingDeleteId;
  closeConfirm();

  try {
    const resp = await fetch(`/api/memories/${encodeURIComponent(gid)}`, { method: 'DELETE' });
    const data = await resp.json();
    if (data.ok) {
      // 移除卡片动画
      const card = document.querySelector(`.memory-card[data-gid="${gid}"]`);
      if (card) {
        card.style.transition = 'opacity .3s, transform .3s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(20px)';
        setTimeout(() => card.remove(), 300);
      }
      allGroups = allGroups.filter(g => g.group_id !== gid);
      document.getElementById('stats').textContent = `共 ${allGroups.length} 组记忆`;
      if (allGroups.length === 0) {
        setTimeout(() => {
          document.getElementById('container').innerHTML = '<div class="empty"><div class="icon">📭</div><p>记忆库为空</p></div>';
        }, 350);
      }
      showToast('删除成功', 'success');
    } else {
      showToast('删除失败: ' + (data.error || '未知错误'), 'error');
    }
  } catch (e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

function showToast(msg, type) {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ESC close modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeConfirm();
  }
});

// Init
loadMemories();
</script>
</body>
</html>
