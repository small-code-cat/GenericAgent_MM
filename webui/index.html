<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowork</title>
<link rel="stylesheet" href="/static/css/github-dark.min.css">
<script src="/static/js/marked.min.js"></script>
<script src="/static/js/highlight.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg-primary: #0f0f0f;
  --bg-secondary: #1a1a1a;
  --bg-tertiary: #252525;
  --bg-hover: #2a2a2a;
  --bg-user-msg: #2b2b2b;
  --bg-ai-msg: transparent;
  --text-primary: #e8e8e8;
  --text-secondary: #999;
  --text-muted: #666;
  --border-color: #2a2a2a;
  --accent: #6c8aff;
  --accent-hover: #8aa4ff;
  --danger: #ff5c5c;
  --success: #4caf50;
  --warning: #ffb74d;
  --sidebar-width: 260px;
  --input-bg: #1e1e1e;
  --code-bg: #161616;
  --scrollbar-thumb: #333;
}
html, body { height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: var(--bg-primary); color: var(--text-primary); }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--scrollbar-thumb); border-radius:3px; }

/* Layout */
.app { display:flex; height:100vh; }
.sidebar { width:var(--sidebar-width); background:var(--bg-secondary); border-right:1px solid var(--border-color); display:flex; flex-direction:column; flex-shrink:0; transition: transform .3s; z-index:10; }
.sidebar.collapsed { transform:translateX(calc(-1 * var(--sidebar-width))); position:absolute; height:100%; }
.main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }

/* Sidebar */
.sidebar-header { padding:20px 16px 12px; border-bottom:1px solid var(--border-color); }
.sidebar-header h2 { font-size:18px; font-weight:600; display:flex; align-items:center; gap:8px; }
.sidebar-header h2 span.icon { font-size:22px; }
.sidebar-section { padding:12px 16px; border-bottom:1px solid var(--border-color); }
.sidebar-section:last-child { border-bottom:none; }
.sidebar-label { font-size:11px; text-transform:uppercase; color:var(--text-muted); letter-spacing:.8px; margin-bottom:8px; font-weight:600; }
.llm-info { font-size:13px; color:var(--text-secondary); margin-bottom:6px; line-height:1.5; word-break:break-all; }
.llm-info .idx { color:var(--accent); font-weight:600; }
.idle-info { font-size:12px; color:var(--text-muted); }

.sidebar-btn { width:100%; padding:9px 12px; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-tertiary); color:var(--text-primary); font-size:13px; cursor:pointer; margin-bottom:6px; transition: all .15s; text-align:left; display:flex; align-items:center; gap:8px; }
.sidebar-btn:hover { background:var(--bg-hover); border-color:#444; }
.sidebar-btn.danger { border-color:#4a2020; color:var(--danger); }
.sidebar-btn.danger:hover { background:#2a1515; }
.sidebar-btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; font-weight:500; }
.sidebar-btn.primary:hover { background:var(--accent-hover); }
.sidebar-btn.active-green { border-color:#2a4a2a; color:var(--success); }
.auto-status { font-size:12px; color:var(--text-muted); margin-top:4px; display:flex; align-items:center; gap:5px; }
.auto-status .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
.dot.on { background:var(--success); box-shadow:0 0 6px var(--success); }
.dot.off { background:var(--danger); }
.sidebar-footer { margin-top:auto; padding:12px 16px; border-top:1px solid var(--border-color); }
.new-chat-btn { width:100%; padding:10px; border:1px dashed var(--border-color); border-radius:8px; background:transparent; color:var(--text-secondary); font-size:13px; cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:6px; }
.new-chat-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,138,255,.05); }

/* Top bar */
.topbar { height:48px; border-bottom:1px solid var(--border-color); display:flex; align-items:center; padding:0 16px; flex-shrink:0; background:var(--bg-secondary); }
.topbar-toggle { background:none; border:none; color:var(--text-secondary); font-size:20px; cursor:pointer; padding:4px 8px; border-radius:6px; }
.topbar-toggle:hover { background:var(--bg-hover); color:var(--text-primary); }
.topbar-title { margin-left:12px; font-size:14px; color:var(--text-secondary); }
.topbar-status { margin-left:auto; font-size:12px; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
.topbar-status .running-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* Chat area */
.chat-area { flex:1; overflow-y:auto; overflow-x:hidden; padding:0; position:relative; }
.scroll-to-bottom { position:absolute; bottom:100px; right:24px; width:40px; height:40px; border-radius:50%; border:1px solid var(--border-color); background:var(--bg-secondary); color:var(--text-secondary); font-size:18px; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:20; transition:all .2s; box-shadow:0 2px 8px rgba(0,0,0,.3); }
.scroll-to-bottom:hover { background:var(--bg-hover); color:var(--text-primary); border-color:#555; }
.scroll-to-bottom.visible { display:flex; }
.chat-inner { max-width:820px; margin:0 auto; padding:24px 20px 20px; }
.welcome { text-align:center; padding:80px 20px; }
.welcome h1 { font-size:28px; font-weight:600; margin-bottom:8px; }
.welcome p { color:var(--text-muted); font-size:15px; }

/* Messages */
.message { padding:20px 0; display:flex; gap:14px; animation: fadeIn .3s; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.message + .message { border-top:1px solid var(--border-color); }
.msg-avatar { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; font-weight:600; }
.msg-avatar.user { background:var(--accent); color:#fff; }
.msg-avatar.ai { background:var(--bg-tertiary); color:var(--accent); border:1px solid var(--border-color); }
.msg-body { flex:1; min-width:0; line-height:1.7; font-size:14.5px; overflow-wrap:break-word; word-break:break-word; }
.msg-body p { margin-bottom:10px; }
.msg-body p:last-child { margin-bottom:0; }
.msg-body ul, .msg-body ol { margin:8px 0 8px 20px; }
.msg-body li { margin-bottom:4px; }
.msg-body strong { font-weight:600; }
.msg-body a { color:var(--accent); text-decoration:none; }
.msg-body a:hover { text-decoration:underline; }
.msg-body blockquote { border-left:3px solid var(--border-color); padding-left:14px; color:var(--text-secondary); margin:10px 0; }
.msg-body h1,.msg-body h2,.msg-body h3,.msg-body h4 { margin:16px 0 8px; font-weight:600; }
.msg-body h1 { font-size:20px; } .msg-body h2 { font-size:17px; } .msg-body h3 { font-size:15px; }
.msg-body hr { border:none; border-top:1px solid var(--border-color); margin:16px 0; }
.msg-body table { border-collapse:collapse; margin:10px 0; width:100%; }
.msg-body th, .msg-body td { border:1px solid var(--border-color); padding:6px 10px; font-size:13px; text-align:left; }
.msg-body th { background:var(--bg-tertiary); font-weight:600; }

/* Code blocks */
.msg-body code { font-family: "SF Mono", "Fira Code", "Cascadia Code", Menlo, monospace; font-size:13px; }
.msg-body :not(pre) > code { background:var(--bg-tertiary); padding:2px 6px; border-radius:4px; font-size:12.5px; color:#e06c75; }
.msg-body pre { background:var(--code-bg); border:1px solid var(--border-color); border-radius:8px; margin:12px 0; overflow:hidden; position:relative; }
.msg-body pre code { display:block; padding:14px 16px; overflow-x:auto; font-size:13px; line-height:1.6; color:var(--text-primary); background:transparent; }
.code-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:var(--bg-tertiary); border-bottom:1px solid var(--border-color); font-size:12px; color:var(--text-muted); }
.copy-btn { background:none; border:1px solid var(--border-color); color:var(--text-secondary); padding:3px 10px; border-radius:4px; font-size:11px; cursor:pointer; transition:all .15s; }
.copy-btn:hover { border-color:#555; color:var(--text-primary); }

/* Cursor blink */
.cursor-blink::after { content:"▌"; animation: blink 1s step-end infinite; color:var(--accent); }
@keyframes blink { 50%{opacity:0} }

/* Input area */
.input-area { border-top:1px solid var(--border-color); padding:16px 20px 20px; background:var(--bg-primary); flex-shrink:0; }
.input-wrap { max-width:820px; margin:0 auto; position:relative; }
.input-box { width:100%; min-height:52px; max-height:200px; padding:14px 52px 14px 18px; border:1px solid var(--border-color); border-radius:14px; background:var(--input-bg); color:var(--text-primary); font-size:14.5px; font-family:inherit; resize:none; outline:none; line-height:1.5; transition: border-color .2s; }
.input-box:focus { border-color:var(--accent); }
.input-box::placeholder { color:var(--text-muted); }
.send-btn { position:absolute; right:10px; bottom:10px; width:34px; height:34px; border-radius:8px; border:none; background:var(--accent); color:#fff; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.send-btn:hover { background:var(--accent-hover); transform:scale(1.05); }
.send-btn:disabled { background:var(--bg-tertiary); color:var(--text-muted); cursor:not-allowed; transform:none; }
.input-hint { text-align:center; font-size:11px; color:var(--text-muted); margin-top:8px; }

/* Image Preview */
.image-preview-area { display:flex; flex-wrap:wrap; gap:8px; padding:0 4px; margin-bottom:8px; }
.image-preview-area:empty { display:none; }
.preview-item { position:relative; width:72px; height:72px; border-radius:8px; overflow:hidden; border:1px solid var(--border-color); background:var(--bg-tertiary); }
.preview-item img { width:100%; height:100%; object-fit:cover; }
.preview-close { position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%; background:rgba(0,0,0,.65); color:#fff; border:none; font-size:13px; line-height:20px; text-align:center; cursor:pointer; padding:0; }
.preview-close:hover { background:rgba(220,50,50,.85); }

/* PDF Preview */
.pdf-preview-area { display:flex; flex-wrap:wrap; gap:8px; padding:0 4px; margin-bottom:8px; }
.pdf-preview-area:empty { display:none; }
.pdf-preview-item { position:relative; display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; border:1px solid var(--border-color); background:var(--bg-tertiary); max-width:280px; transition:border-color .2s; }
.pdf-preview-item:hover { border-color:var(--accent); }
.pdf-preview-item .pdf-icon { font-size:28px; flex-shrink:0; }
.pdf-preview-item .pdf-info { flex:1; min-width:0; }
.pdf-preview-item .pdf-name { font-size:12px; font-weight:500; color:var(--text-primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pdf-preview-item .pdf-size { font-size:10px; color:var(--text-muted); margin-top:2px; }
.pdf-preview-item .pdf-status { font-size:10px; margin-top:2px; }
.pdf-preview-item .pdf-status.uploading { color:var(--accent); display:flex; align-items:center; gap:6px; }
.pdf-preview-item .pdf-status.success { color:var(--success); }
.pdf-preview-item .pdf-status.error { color:var(--danger); }

/* Circular Progress Ring */
.pdf-progress-ring { width:28px; height:28px; flex-shrink:0; }
.pdf-progress-ring .ring-bg { fill:none; stroke:var(--border-color); stroke-width:3; }
.pdf-progress-ring .ring-fg { fill:none; stroke:var(--accent); stroke-width:3; stroke-linecap:round; transition:stroke-dashoffset .3s ease; transform:rotate(-90deg); transform-origin:50% 50%; }
.pdf-progress-ring.indeterminate .ring-fg { animation: ring-spin 1.2s linear infinite; stroke-dasharray:15 48; stroke-dashoffset:0; }
@keyframes ring-spin { to { transform: rotate(270deg); transform-origin:50% 50%; } }
.pdf-progress-text { font-size:10px; font-weight:600; color:var(--accent); min-width:28px; text-align:right; }
.pdf-elapsed { font-size:9px; color:var(--text-muted); margin-left:4px; }
.pdf-preview-item .pdf-close { position:absolute; top:4px; right:4px; width:18px; height:18px; border-radius:50%; background:rgba(0,0,0,.5); color:#fff; border:none; font-size:12px; line-height:18px; text-align:center; cursor:pointer; padding:0; }
.pdf-preview-item .pdf-close:hover { background:rgba(220,50,50,.85); }

/* Input Toolbar */
.input-toolbar { display:flex; gap:6px; padding:6px 4px 0; }
.toolbar-btn { background:none; border:1px solid var(--border-color); color:var(--text-secondary); padding:5px 12px; border-radius:8px; font-size:12px; cursor:pointer; transition:all .15s; display:flex; align-items:center; gap:4px; }
.toolbar-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(108,138,255,.06); }
.toolbar-btn.recording { border-color:var(--danger); color:var(--danger); animation: pulse-red 1s infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 8px rgba(220,50,50,.4)} }
.toolbar-btn.camera-on { border-color:var(--success); color:var(--success); }

/* Camera Preview */
.camera-preview { display:none; position:fixed; bottom:120px; right:20px; z-index:100; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.5); border:2px solid var(--border-color); background:#000; transition:all .3s; }
.camera-preview.active { display:block; }
.camera-preview video { width:240px; height:180px; object-fit:cover; display:block; }
.camera-preview .cam-status { position:absolute; top:8px; left:8px; display:flex; align-items:center; gap:4px; font-size:11px; color:#fff; background:rgba(0,0,0,.5); padding:2px 8px; border-radius:10px; }
.camera-preview .cam-status .rec-dot { width:8px; height:8px; border-radius:50%; background:var(--danger); animation:pulse-red 1s infinite; }

/* User message images */
.msg-images { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
.msg-images img { max-width:200px; max-height:150px; border-radius:8px; border:1px solid var(--border-color); cursor:pointer; }
.msg-images img:hover { border-color:var(--accent); }

/* Toast */
.toast-container { position:fixed; top:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 18px; border-radius:8px; font-size:13px; color:#fff; animation: slideIn .3s, fadeOut .3s 2.7s forwards; background:var(--bg-tertiary); border:1px solid var(--border-color); }
.toast.success { border-color:#2a4a2a; } .toast.error { border-color:#4a2020; }
@keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:none;opacity:1} }
@keyframes fadeOut { to{opacity:0;transform:translateY(-10px)} }

/* Thinking & Summary Blocks */
.thinking-block {
  background: rgba(255,255,255,.03);
  border-left: 3px solid rgba(150,150,170,.4);
  border-radius: 0 8px 8px 0;
  padding: 10px 16px;
  margin: 8px 0;
  font-size: .85em;
  color: var(--text-secondary);
  font-style: italic;
  line-height: 1.6;
  opacity: 0.75;
}
.thinking-block .thinking-label {
  font-size: .75em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: rgba(150,150,170,.7);
  margin-bottom: 6px;
  font-style: normal;
}
.thinking-block p { margin: 4px 0; }

.summary-block {
  background: linear-gradient(135deg, rgba(99,102,241,.06), rgba(139,92,246,.06));
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 10px 16px;
  margin: 8px 0;
  font-size: .9em;
  font-weight: 500;
  color: var(--accent);
  line-height: 1.5;
}
.summary-block .summary-label {
  font-size: .75em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: rgba(99,102,241,.6);
  margin-bottom: 4px;
}
.summary-block p { margin: 4px 0; }

/* Tool Use Block */
.tool-use-block {
  background: rgba(16,185,129,.04);
  border-left: 3px solid rgba(16,185,129,.5);
  border-radius: 0 8px 8px 0;
  padding: 10px 16px;
  margin: 8px 0;
  font-size: .85em;
  color: var(--text-secondary);
  line-height: 1.6;
}
.tool-use-block .tool-use-label {
  font-size: .75em;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: rgba(16,185,129,.8);
  margin-bottom: 6px;
}
.tool-use-block pre {
  background: rgba(0,0,0,.2);
  border-radius: 6px;
  padding: 8px 12px;
  margin: 6px 0 2px;
  overflow-x: auto;
  font-size: .95em;
}
.tool-use-block code {
  color: rgba(16,185,129,.9);
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.tool-use-block p { margin: 4px 0; }

/* Responsive */
@media (max-width:768px) {
  .sidebar { position:absolute; height:100%; }
  .sidebar:not(.collapsed) { box-shadow:4px 0 20px rgba(0,0,0,.5); }
  .chat-inner, .input-wrap { padding-left:12px; padding-right:12px; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><span class="icon">🖥️</span> Cowork</h2>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">模型</div>
      <div class="llm-info" id="llmInfo">加载中...</div>
      <div class="idle-info" id="idleInfo"></div>
      <button class="sidebar-btn" onclick="switchLLM()">🔄 切换备用链路</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">控制</div>
      <button class="sidebar-btn danger" onclick="abortTask()">⏹ 强行停止任务</button>
      <button class="sidebar-btn" onclick="reinjectPrompt()">🔄 重新注入 System Prompt</button>
      <button class="sidebar-btn" onclick="window.open('token_stats.html','_blank')">📊 Token 用量统计</button>
      <button class="sidebar-btn" onclick="window.open('memory_manager.html','_blank')">🧠 多模态记忆库</button>
      <button class="sidebar-btn" onclick="window.open('pdf_knowledge.html','_blank')">📚 PDF 知识库</button>
</div>

    <div class="sidebar-section">
      <div class="sidebar-label">自主行动</div>
      <button class="sidebar-btn" onclick="forceAutonomous()">🚀 立即开始自主行动</button>
      <button class="sidebar-btn primary" id="autoToggleBtn" onclick="toggleAutonomous()">▶️ 允许自主行动</button>
      <div class="auto-status" id="autoStatus"><span class="dot off"></span> 自主行动已停止</div>
    </div>

    <div class="sidebar-footer">
      <button class="new-chat-btn" onclick="clearChat()">✨ 清空对话</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
      <span class="topbar-title" id="topbarTitle">Cowork</span>
      <div class="topbar-status" id="topbarStatus"></div>
    </div>

    <div class="chat-area" id="chatArea">
      <div class="chat-inner" id="chatInner">
        <div class="welcome" id="welcomeScreen">
          <h1>🖥️ Cowork</h1>
          <p>输入指令开始协作</p>
        </div>
      </div>
    </div>
    <button class="scroll-to-bottom" id="scrollToBottomBtn" onclick="scrollToBottom()" title="回到底部">↓</button>

    <div class="input-area">
      <div class="input-wrap">
        <div class="image-preview-area" id="imagePreviewArea"></div>
        <div class="pdf-preview-area" id="pdfPreviewArea"></div>
        <textarea class="input-box" id="inputBox" placeholder="输入指令... (Enter 发送, Shift+Enter 换行, 可粘贴图片/PDF)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="发送">↑</button>
      </div>
      <div class="input-toolbar">
        <button class="toolbar-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">🎤 语音</button>
        <button class="toolbar-btn" id="cameraBtn" onclick="toggleCamera()" title="摄像头截图">📷 摄像头</button>
        <button class="toolbar-btn" id="pdfBtn" onclick="triggerPDFUpload()" title="上传PDF文件">📎 PDF</button>
        <input type="file" id="pdfFileInput" accept=".pdf" multiple style="display:none" onchange="handlePDFFileSelect(event)">
      </div>
      <div class="input-hint">Enter 发送 · Shift+Enter 换行 · 可粘贴图片/PDF · 支持拖拽PDF</div>
    </div>
  </div>
</div>

<!-- Camera Preview -->
<div class="camera-preview" id="cameraPreview">
  <div class="cam-status"><span class="rec-dot"></span> LIVE</div>
  <video id="cameraVideo" autoplay playsinline muted></video>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ===== State =====
let isStreaming = false;
let messages = [];
let composing = false;
let pendingImages = [];  // [{dataUrl, file}]
let pendingPDFs = [];    // [{file, name, size, status, id}]
let mediaStream = null;
let cameraActive = false;
let recognition = null;
let isRecording = false;

// ===== Chat Cache (IndexedDB) =====
const MAX_CACHE_MESSAGES = 50;
const IDB_NAME = 'CoworkChatDB';
const IDB_STORE = 'chatHistory';
const IDB_KEY = 'current';

function _openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function saveChatHistory() {
  let msgs = messages;
  if (msgs.length > MAX_CACHE_MESSAGES) {
    msgs = msgs.slice(-MAX_CACHE_MESSAGES);
  }
  _openDB().then(db => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put({ messages: msgs }, IDB_KEY);
    tx.oncomplete = () => db.close();
    tx.onerror = () => { console.error('Failed to save chat history to IndexedDB'); db.close(); };
  }).catch(e => {
    console.error('IndexedDB open failed, falling back to localStorage:', e);
    try { localStorage.setItem('chatHistory', JSON.stringify({ messages: msgs })); } catch(_) {}
  });
}

async function restoreChatHistory() {
  try {
    // Try IndexedDB first
    const db = await _openDB();
    const data = await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
      tx.oncomplete = () => db.close();
    });

    // Migrate from localStorage if IndexedDB is empty
    if (!data || !data.messages || data.messages.length === 0) {
      const legacy = localStorage.getItem('chatHistory');
      if (legacy) {
        const parsed = JSON.parse(legacy);
        if (parsed.messages && parsed.messages.length > 0) {
          messages = parsed.messages;
          _renderRestoredMessages();
          saveChatHistory(); // migrate to IndexedDB
          localStorage.removeItem('chatHistory');
          return;
        }
      }
      return;
    }

    messages = data.messages;
    _renderRestoredMessages();
  } catch(e) {
    console.error('Failed to restore chat history:', e);
    // Fallback: try localStorage
    try {
      const saved = localStorage.getItem('chatHistory');
      if (!saved) return;
      const d = JSON.parse(saved);
      if (d.messages && d.messages.length > 0) {
        messages = d.messages;
        _renderRestoredMessages();
      }
    } catch(_) {}
  }
}

function _renderRestoredMessages() {
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();
  for (const msg of messages) {
    if (msg.role === 'user' && msg.images && msg.images.length > 0) {
      let html = '<div class="msg-images">' + msg.images.map(src =>
        `<img src="${src}" alt="uploaded">`
      ).join('') + '</div>' + escapeHtml(msg.content);
      addMessage('user', html, false, true);
    } else {
      addMessage(msg.role === 'assistant' ? 'ai' : 'user', msg.content);
    }
  }
  document.querySelectorAll('#chatInner pre code').forEach(el => {
    try { hljs.highlightElement(el); } catch {}
  });
  scrollToBottom();
}

// ===== Utils =====
function toast(msg, type='') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);

}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderMarkdown(text) {
  // === Placeholder-based block extraction to prevent nesting ===
  const _blocks = {};
  let _bid = 0;
  function _ph(id) { return '%%BLOCK_' + id + '%%'; }

  // Pass 1a: Extract tool_use blocks FIRST (before thinking/summary)
  // This prevents <thinking>/<summary> tags inside tool_use JSON from being mis-extracted
  let _changed = true;
  while (_changed) {
    _changed = false;
    text = text.replace(/<tool_use>([\s\S]*?)<\/tool_use>/gi, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'tool_use', content:c.trim()}; _changed = true; return '\n' + _ph(id) + '\n';
    });
  }
  // Pass 1b: Extract thinking/summary blocks (inner-first via multi-pass)
  _changed = true;
  while (_changed) {
    _changed = false;
    text = text.replace(/<thinking>([\s\S]*?)<\/thinking>/gi, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'thinking', content:c.trim()}; _changed = true; return '\n' + _ph(id) + '\n';
    });
    text = text.replace(/<summary>([\s\S]*?)<\/summary>/gi, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'summary', content:c.trim()}; _changed = true; return '\n' + _ph(id) + '\n';
    });
  }

  // Pass 2: Handle unclosed tags (streaming) — only the LAST unclosed one
  if (/<thinking>(?![\s\S]*<\/thinking>)/i.test(text)) {
    text = text.replace(/<thinking>([\s\S]*)$/i, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'thinking', content:c.trim()}; return '\n' + _ph(id) + '\n';
    });
  }
  if (/<summary>(?![\s\S]*<\/summary>)/i.test(text)) {
    text = text.replace(/<summary>([\s\S]*)$/i, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'summary', content:c.trim()}; return '\n' + _ph(id) + '\n';
    });
  }
  if (/<tool_use>(?![\s\S]*<\/tool_use>)/i.test(text)) {
    text = text.replace(/<tool_use>([\s\S]*)$/i, (m, c) => {
      const id = _bid++; _blocks[id] = {type:'tool_use', content:c.trim()}; return '\n' + _ph(id) + '\n';
    });
  }

  // Pass 3: Render main text with marked
  let html = marked.parse(text);

  // Pass 4: Render each block's content to HTML (without expanding inner placeholders yet)
  const _renderedBlocks = {};
  for (const [id, block] of Object.entries(_blocks)) {
    if (block.type === 'thinking') {
      const inner = marked.parse(block.content);
      _renderedBlocks[id] = '<div class="thinking-block"><div class="thinking-label">💭 Thinking</div>' + inner + '</div>';
    } else if (block.type === 'summary') {
      const inner = marked.parse(block.content);
      _renderedBlocks[id] = '<div class="summary-block"><div class="summary-label">📋 Summary</div>' + inner + '</div>';
    } else if (block.type === 'tool_use') {
      let content = block.content;
      let label = '🔧 Tool Use';
      try {
        const parsed = JSON.parse(content);
        if (parsed.name) label = '🔧 ' + parsed.name;
        content = '```json\n' + JSON.stringify(parsed, null, 2) + '\n```';
      } catch(e) {
        if (content.startsWith('{')) {
          content = '```json\n' + content + '\n```';
        }
      }
      const inner = marked.parse(content);
      _renderedBlocks[id] = '<div class="tool-use-block"><div class="tool-use-label">' + label + '</div>' + inner + '</div>';
    }
  }

  // Pass 5: Replace placeholders — single ascending pass (inner blocks have lower IDs)
  const _ids = Object.keys(_renderedBlocks).map(Number).sort((a, b) => a - b);
  for (const id of _ids) {
    const phPattern = _ph(id);
    const escaped = phPattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const phInP = new RegExp('<p>' + escaped + '<\\/p>', 'g');
    const phPlain = new RegExp(escaped, 'g');
    // Expand inner placeholders in this block's rendered content
    for (const innerId of _ids) {
      if (innerId >= id) break; // only lower IDs can be nested inside
      const innerPh = _ph(innerId);
      const innerEsc = innerPh.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      const innerInP = new RegExp('<p>' + innerEsc + '<\\/p>', 'g');
      const innerPlain = new RegExp(innerEsc, 'g');
      _renderedBlocks[id] = _renderedBlocks[id].replace(innerInP, _renderedBlocks[innerId]);
      _renderedBlocks[id] = _renderedBlocks[id].replace(innerPlain, _renderedBlocks[innerId]);
    }
    // Replace in main html
    html = html.replace(phInP, _renderedBlocks[id]);
    html = html.replace(phPlain, _renderedBlocks[id]);
  }

  // Clean up any orphan placeholders
  html = html.replace(/%%BLOCK_\d+%%/g, '');
  // Add code headers with copy buttons
  html = html.replace(/<pre><code class="language-(\w+)">/g,
    '<pre><div class="code-header"><span>$1</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><code class="language-$1">');
  html = html.replace(/<pre><code>/g,
    '<pre><div class="code-header"><span>code</span><button class="copy-btn" onclick="copyCode(this)">复制</button></div><code>');
  return html;
}

function copyCode(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

function autoResize(el) {
  el.style.height = 'auto';

}

function scrollToBottom() {

}

// ===== Chat =====
function addMessage(role, content, streaming=false, rawHtml=false) {
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();

  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = 'message';
  const avatarClass = role === 'user' ? 'user' : 'ai';
  const avatarText = role === 'user' ? 'U' : 'A';
  let bodyContent;
  if (role === 'user') {
    bodyContent = rawHtml ? content : '<p>' + escapeHtml(content) + '</p>';
  } else {
    bodyContent = renderMarkdown(content);
  }
  div.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${avatarText}</div>
    <div class="msg-body${streaming ? ' cursor-blink' : ''}">${bodyContent}</div>`;
  inner.appendChild(div);
  scrollToBottom();
  return div;
}

// Throttled stream rendering — at most once per 150ms
let _streamThrottleTimer = null;
let _streamLatestContent = '';
let _streamLatestDiv = null;

function updateStreamMessage(div, content) {
  _streamLatestContent = content;
  _streamLatestDiv = div;
  if (_streamThrottleTimer) return; // throttled, will render on next tick
  _doStreamRender();
  _streamThrottleTimer = setTimeout(() => {
    _streamThrottleTimer = null;
    // Render the latest content that arrived during throttle window
    _doStreamRender();
  }, 150);
}

function _doStreamRender() {
  if (!_streamLatestDiv) return;
  const body = _streamLatestDiv.querySelector('.msg-body');
  body.innerHTML = renderMarkdown(_streamLatestContent);
  body.classList.add('cursor-blink');
  scrollToBottom();
}

function finalizeMessage(div, content) {
  // Clear any pending throttled render
  if (_streamThrottleTimer) { clearTimeout(_streamThrottleTimer); _streamThrottleTimer = null; }
  _streamLatestDiv = null;
  _streamLatestContent = '';
  const body = div.querySelector('.msg-body');
  body.innerHTML = renderMarkdown(content);
  body.classList.remove('cursor-blink');
  // Re-highlight
  body.querySelectorAll('pre code').forEach(el => {
    try { hljs.highlightElement(el); } catch {}
  });
}

async function sendMessage() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  const images = [...pendingImages];
  const pdfs = [...pendingPDFs];
  if ((!text && images.length === 0 && pdfs.length === 0) || isStreaming) return;

  input.value = '';
  autoResize(input);
  pendingImages = [];
  renderImagePreviews();
  pendingPDFs = [];
  renderPDFPreviews();
  isStreaming = true;
  updateSendBtn();

  // Build user display with image thumbnails
  let userDisplay = '';
  if (images.length > 0) {
    userDisplay += '<div class="msg-images">' + images.map(img =>
      `<img src="${img.dataUrl}" alt="uploaded">`
    ).join('') + '</div>';
  }
  // Show attached PDF names
  if (pdfs.length > 0) {
    const pdfNames = pdfs.filter(p => p.status === 'success').map(p => '📄 ' + escapeHtml(p.name));
    if (pdfNames.length > 0) {
      userDisplay += '<div class="msg-pdfs" style="margin-bottom:4px;color:var(--text-secondary);font-size:0.85em">' + pdfNames.join(' &nbsp; ') + ' (已入库)</div>';
    }
  }
  userDisplay += escapeHtml(text);
  const imgDataUrls = images.map(img => img.dataUrl);
  messages.push({role:'user', content:text, images: imgDataUrls.length > 0 ? imgDataUrls : undefined});
  addMessage('user', userDisplay, false, true);
  saveChatHistory();

  const aiDiv = addMessage('ai', '', true);
  let fullContent = '';

  try {
    // Auto-capture camera frame if camera is active
    if (cameraActive) {
      const frameDataUrl = captureCurrentFrame();
      if (frameDataUrl) {
        images.push({dataUrl: frameDataUrl, name: 'camera_frame.jpg'});
      }
    }
    const payload = {message: text};
    if (images.length > 0) {
      payload.images = await prepareImagesForPayload(images);
    }
    let resp;
    try {
      resp = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });
    } catch (netErr) {
      throw new Error((netErr && netErr.message) || '网络请求失败（可尝试缩小图片或换 Chrome）');
    }

    if (!resp.ok) {
      let detail = '';
      try { detail = (await resp.text()).slice(0, 400); } catch (_) {}
      throw new Error('HTTP ' + resp.status + (detail ? ': ' + detail : ''));
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});

      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'stream') {
            fullContent = data.content;
            updateStreamMessage(aiDiv, fullContent);
          } else if (data.type === 'done') {
            fullContent = data.content;
            finalizeMessage(aiDiv, fullContent);
          } else if (data.type === 'error') {
            fullContent += '\n\n⚠️ ' + data.content;
            finalizeMessage(aiDiv, fullContent);
          }
        } catch {}
      }
    }
  } catch (e) {
    fullContent = '⚠️ 连接错误: ' + e.message;
    finalizeMessage(aiDiv, fullContent);
  }

  messages.push({role:'assistant', content:fullContent});
  saveChatHistory();
  isStreaming = false;
  updateSendBtn();
  // [修复] 移除无条件自动recall，记忆展示应由AI Agent按需触发，而非每条消息都调用
  //
}


function clearChat() {
  messages = [];
  _openDB().then(db => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(IDB_KEY);
    tx.oncomplete = () => db.close();
  }).catch(() => {});
  localStorage.removeItem('chatHistory'); // also clear legacy
  const inner = document.getElementById('chatInner');
  inner.innerHTML = '<div class="welcome" id="welcomeScreen"><h1>🖥️ Cowork</h1><p>输入指令开始协作</p></div>';
}

// ===== Multimodal =====
/** 上传前压缩：避免整图 base64 塞进 JSON 导致 Safari「Load failed」或代理断连 */
function compressDataUrlForChat(dataUrl, maxSide = 2048, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        let w = img.naturalWidth, h = img.naturalHeight;
        if (!w || !h) { resolve(dataUrl); return; }
        const scale = Math.min(1, maxSide / Math.max(w, h));
        const nw = Math.max(1, Math.round(w * scale));
        const nh = Math.max(1, Math.round(h * scale));
        const canvas = document.createElement('canvas');
        canvas.width = nw;
        canvas.height = nh;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, nw, nh);
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch (err) {
        resolve(dataUrl);
      }
    };
    img.onerror = () => resolve(dataUrl);
    img.src = dataUrl;
  });
}

async function prepareImagesForPayload(images) {
  const out = [];
  for (const img of images) {
    const raw = img.dataUrl;
    if (!raw || typeof raw !== 'string') continue;
    // 略大的图就压：Safari 对大 JSON 容易直接 Load failed
    if (raw.length < 100000) {
      out.push(raw);
      continue;
    }
    out.push(await compressDataUrlForChat(raw));
  }
  return out;
}

function renderImagePreviews() {
  const container = document.getElementById('imagePreviewArea');
  if (!container) return;
  if (pendingImages.length === 0) {
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = pendingImages.map((img, i) => `
    <div class="preview-item">
      <img src="${img.dataUrl}" alt="preview">
      <button class="preview-close" onclick="removeImage(${i})">&times;</button>
    </div>
  `).join('');
}

function addImageFromDataUrl(dataUrl) {
  if (pendingImages.length >= 5) {
    toast('最多添加5张图片', 'error');
    return;
  }
  pendingImages.push({dataUrl});
  renderImagePreviews();
}

function removeImage(index) {
  pendingImages.splice(index, 1);
  renderImagePreviews();
}

function handleImagePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (ev) => addImageFromDataUrl(ev.target.result);
      reader.readAsDataURL(file);
      return;
    }
  }
}

function handleImageUpload() {
  const fileInput = document.createElement('input');
  fileInput.type = 'file';
  fileInput.accept = 'image/*';
  fileInput.multiple = true;
  fileInput.onchange = (e) => {
    for (const file of e.target.files) {
      const reader = new FileReader();
      reader.onload = (ev) => addImageFromDataUrl(ev.target.result);
      reader.readAsDataURL(file);
    }
  };
  fileInput.click();
}

// ===== PDF Upload & Preview =====
let _pdfIdCounter = 0;

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function triggerPDFUpload() {
  document.getElementById('pdfFileInput').click();
}

function handlePDFFileSelect(e) {
  const files = e.target.files;
  if (!files || files.length === 0) return;
  for (const file of files) {
    if (file.type !== 'application/pdf') {
      toast('仅支持 PDF 文件: ' + file.name, 'error');
      continue;
    }
    addPDFAndUpload(file);
  }
  e.target.value = ''; // reset so same file can be selected again
}

function addPDFAndUpload(file) {
  if (pendingPDFs.length >= 5) {
    toast('最多同时上传5个PDF', 'error');
    return;
  }
  const id = 'pdf_' + (++_pdfIdCounter);
  const entry = { file, name: file.name, size: file.size, status: 'uploading', id, result: null };
  pendingPDFs.push(entry);
  renderPDFPreviews();
  uploadPDFFile(entry);
}

function uploadPDFFile(entry) {
  entry.progress = 0;
  entry.progressMsg = '正在上传...';
  entry._startTime = Date.now();
  const formData = new FormData();
  formData.append('file', entry.file);
  const xhr = new XMLHttpRequest();
  entry._xhr = xhr;

  // 上传阶段进度（占总进度 0~5%，因为上传很快）
  xhr.upload.addEventListener('progress', (e) => {
    if (e.lengthComputable) {
      entry.progress = Math.round((e.loaded / e.total) * 5);
      entry.progressMsg = '正在上传...';
      renderPDFPreviews();
    }
  });

  xhr.addEventListener('load', () => {
    try {
      const data = JSON.parse(xhr.responseText);
      if (xhr.status >= 200 && xhr.status < 300 && data.task_id) {
        // 上传成功，开始轮询服务端处理进度
        entry.progress = 5;
        entry.progressMsg = '已上传，等待处理...';
        entry.taskId = data.task_id;
        renderPDFPreviews();
        pollPDFProgress(entry);
      } else {
        entry.status = 'error';
        entry.errorMsg = data.error || data.message || '上传失败';
        toast('PDF 上传失败: ' + entry.errorMsg, 'error');
        renderPDFPreviews();
      }
    } catch (e) {
      entry.status = 'error';
      entry.errorMsg = '响应解析失败';
      toast('PDF 上传失败: ' + entry.errorMsg, 'error');
      renderPDFPreviews();
    }
  });

  xhr.addEventListener('error', () => {
    entry.status = 'error';
    entry.errorMsg = '网络错误';
    toast('PDF 上传失败: ' + entry.errorMsg, 'error');
    renderPDFPreviews();
  });

  xhr.addEventListener('abort', () => {
    entry.status = 'error';
    entry.errorMsg = '上传已取消';
    renderPDFPreviews();
  });

  xhr.open('POST', '/api/upload_pdf');
  xhr.send(formData);
}

function _fmtElapsed(ms) {
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + '秒';
  return Math.floor(s / 60) + '分' + (s % 60) + '秒';
}

function pollPDFProgress(entry) {
  if (!entry.taskId || entry.status !== 'uploading') return;
  fetch('/api/pdf_progress/' + entry.taskId)
    .then(r => r.json())
    .then(data => {
      if (entry.status !== 'uploading') return;
      if (data.status === 'done' && data.result) {
        if (data.result.status === 'success') {
          entry.status = 'success';
          entry.progress = 100;
          entry.result = data.result;
          const elapsed = _fmtElapsed(Date.now() - (entry._startTime || Date.now()));
          toast('PDF 已入库: ' + entry.name + ' (' + elapsed + ')', 'success');
        } else {
          entry.status = 'error';
          entry.errorMsg = data.result.message || '处理失败';
          toast('PDF 处理失败: ' + entry.errorMsg, 'error');
        }
      } else {
        const stage = data.stage || '';
        const cur = data.current || 0, tot = data.total || 0;
        // 进度映射: convert 5~50%, embed 50~95%
        if (stage === 'convert') {
          entry._stageLabel = '转换页面';
          if (tot > 0) {
            entry.progress = 5 + Math.round((cur / tot) * 45);
            entry.progressMsg = '转换页面 ' + cur + '/' + tot;
          } else {
            entry.progress = 5;
            entry.progressMsg = '正在解析 PDF...';
            entry._indeterminate = true;
          }
        } else if (stage === 'embed') {
          entry._indeterminate = false;
          entry._stageLabel = '向量入库';
          if (tot > 0) {
            entry.progress = 50 + Math.round((cur / tot) * 45);
            entry.progressMsg = '向量入库 ' + cur + '/' + tot;
          } else {
            entry.progress = 50;
            entry.progressMsg = '准备入库...';
          }
        } else {
          entry.progressMsg = data.message || '处理中...';
        }
        setTimeout(() => pollPDFProgress(entry), 800);
      }
      renderPDFPreviews();
    })
    .catch(() => {
      setTimeout(() => pollPDFProgress(entry), 2000);
    });
}

function renderPDFPreviews() {
  const container = document.getElementById('pdfPreviewArea');
  if (!container) return;
  if (pendingPDFs.length === 0) {
    container.innerHTML = '';
    return;
  }
  container.innerHTML = pendingPDFs.map((p, i) => {
    let statusHtml = '';
    if (p.status === 'uploading') {
      const pct = p.progress || 0;
      const r = 10, c = 2 * Math.PI * r;
      const offset = c - (pct / 100) * c;
      const msg = p.progressMsg || (pct + '%');
      const indet = p._indeterminate ? ' indeterminate' : '';
      const elapsed = p._startTime ? ' <span class="pdf-elapsed">' + _fmtElapsed(Date.now() - p._startTime) + '</span>' : '';
      statusHtml = '<div class="pdf-status uploading">' +
        '<svg class="pdf-progress-ring' + indet + '" viewBox="0 0 28 28">' +
        '<circle class="ring-bg" cx="14" cy="14" r="' + r + '"/>' +
        '<circle class="ring-fg" cx="14" cy="14" r="' + r + '" stroke-dasharray="' + c.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '"/>' +
        '</svg>' +
        '<span class="pdf-progress-text">' + escapeHtml(msg) + '</span>' + elapsed +
        '</div>';
    }
    else if (p.status === 'success') statusHtml = '<div class="pdf-status success">✅ 已入库</div>';
    else if (p.status === 'error') statusHtml = '<div class="pdf-status error">❌ ' + escapeHtml(p.errorMsg || '失败') + '</div>';
    return `<div class="pdf-preview-item">
      <div class="pdf-icon">📄</div>
      <div class="pdf-info">
        <div class="pdf-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</div>
        <div class="pdf-size">${formatFileSize(p.size)}</div>
        ${statusHtml}
      </div>
      <button class="pdf-close" onclick="removePDFPreview(${i})" title="移除">&times;</button>
    </div>`;
  }).join('');
}

function removePDFPreview(index) {
  pendingPDFs.splice(index, 1);
  renderPDFPreviews();
}

function handlePDFPaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return false;
  for (const item of items) {
    if (item.type === 'application/pdf') {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) addPDFAndUpload(file);
      return true;
    }
  }
  // Check for PDF files in files list (some browsers)
  const files = e.clipboardData?.files;
  if (files) {
    for (const file of files) {
      if (file.type === 'application/pdf' || file.name?.endsWith('.pdf')) {
        e.preventDefault();
        addPDFAndUpload(file);
        return true;
      }
    }
  }
  return false;
}

function toggleVoice() {
  const btn = document.getElementById('voiceBtn');
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    toast('浏览器不支持语音识别', 'error');
    return;
  }
  if (isRecording && recognition) {
    recognition.stop();
    return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.interimResults = true;
  recognition.continuous = false;

  recognition.onstart = () => {
    isRecording = true;
    btn.classList.add('recording');
    btn.title = '停止录音';
  };
  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    document.getElementById('inputBox').value = transcript;
    autoResize(document.getElementById('inputBox'));
  };
  recognition.onend = () => {
    isRecording = false;
    btn.classList.remove('recording');
    btn.title = '语音输入';
    recognition = null;
  };
  recognition.onerror = (e) => {
    toast('语音识别错误: ' + e.error, 'error');
    isRecording = false;
    btn.classList.remove('recording');
    recognition = null;
  };
  recognition.start();
}

function toggleCamera() {
  if (cameraActive) {
    stopCamera();
  } else {
    startCamera();
  }
}

function startCamera() {
  const preview = document.getElementById('cameraPreview');
  const video = document.getElementById('cameraVideo');
  navigator.mediaDevices.getUserMedia({video: {facingMode: 'environment'}})
    .then(stream => {
      mediaStream = stream;
      video.srcObject = stream;
      cameraActive = true;
      preview.classList.add('active');
      document.querySelector('[onclick="toggleCamera()"]').style.color = 'var(--success)';
      toast('摄像头已开启', 'success');
    })
    .catch(err => {
      toast('无法访问摄像头: ' + err.message, 'error');
    });
}

function stopCamera() {
  const preview = document.getElementById('cameraPreview');
  const video = document.getElementById('cameraVideo');
  if (mediaStream) {
    mediaStream.getTracks().forEach(t => t.stop());
    mediaStream = null;
  }
  video.srcObject = null;
  cameraActive = false;
  preview.classList.remove('active');
  document.querySelector('[onclick="toggleCamera()"]').style.color = '';
  toast('摄像头已关闭', 'success');
}

function captureCurrentFrame() {
  const video = document.getElementById('cameraVideo');
  if (!video.srcObject || video.readyState < 2) return null;
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.85);
}

// ===== Controls =====
async function abortTask() {
  try {
    await fetch('/api/abort', {method:'POST'});
    toast('已发送停止信号', 'success');
  } catch { toast('操作失败', 'error'); }
}

async function switchLLM() {
  try {
    const r = await fetch('/api/switch_llm', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const d = await r.json();
    toast('已切换到: ' + d.current, 'success');
    refreshStatus();
  } catch { toast('切换失败', 'error'); }
}

async function reinjectPrompt() {
  try {
    await fetch('/api/reinject_prompt', {method:'POST'});
    toast('下次将重新注入 System Prompt', 'success');
  } catch { toast('操作失败', 'error'); }
}

async function toggleAutonomous() {
  try {
    const r = await fetch('/api/autonomous', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'toggle'})});
    const d = await r.json();
    updateAutoUI(d.autonomous_enabled);
    toast(d.autonomous_enabled ? '✅ 已允许自主行动' : '⏸️ 已禁止自主行动', 'success');
  } catch { toast('操作失败', 'error'); }
}

async function forceAutonomous() {
  try {
    await fetch('/api/autonomous', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'force_start'})});
    toast('已将空闲时间设为30分钟', 'success');
  } catch { toast('操作失败', 'error'); }
}

function updateAutoUI(enabled) {
  const btn = document.getElementById('autoToggleBtn');
  const status = document.getElementById('autoStatus');
  if (enabled) {
    btn.textContent = '⏸️ 禁止自主行动';
    btn.className = 'sidebar-btn active-green';
    status.innerHTML = '<span class="dot on"></span> 自主行动运行中';
  } else {
    btn.textContent = '▶️ 允许自主行动';
    btn.className = 'sidebar-btn primary';
    status.innerHTML = '<span class="dot off"></span> 自主行动已停止';
  }
}

function updateSendBtn() {
  const btn = document.getElementById('sendBtn');
  btn.disabled = isStreaming;
  btn.textContent = isStreaming ? '…' : '↑';
}

// ===== Sidebar =====
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ===== Status Polling =====
async function refreshStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('llmInfo').innerHTML = `<span class="idx">#${d.llm_no}</span> ${escapeHtml(d.llm_name)}`;
    const idle = d.idle_seconds;
    document.getElementById('idleInfo').textContent = idle > 0 ? `空闲: ${idle}s` : '';
    const ts = document.getElementById('topbarStatus');
    if (d.is_running) {
      ts.innerHTML = '<span class="running-dot"></span> 运行中';
    } else {
      ts.innerHTML = '<span style="color:var(--success)">●</span> 就绪';
    }
    updateAutoUI(d.autonomous_enabled);
  } catch {}
}
let _statusTimer = setInterval(refreshStatus, 3000);
refreshStatus();
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(_statusTimer);
    _statusTimer = null;
  } else {
    refreshStatus();
    _statusTimer = setInterval(refreshStatus, 3000);
  }
});

// ===== Input Handling =====
const inputBox = document.getElementById('inputBox');
inputBox.addEventListener('compositionstart', () => composing = true);
inputBox.addEventListener('compositionend', () => { composing = false; });
inputBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !composing && e.keyCode !== 229) {
    e.preventDefault();
    sendMessage();
  }
});
inputBox.addEventListener('input', () => autoResize(inputBox));
inputBox.addEventListener('paste', (e) => {
  if (!handlePDFPaste(e)) handleImagePaste(e);
});

// Drag & drop PDF support
const inputWrapper = inputBox.closest('.input-wrapper') || inputBox.parentElement;
inputWrapper.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); inputWrapper.classList.add('drag-over'); });
inputWrapper.addEventListener('dragleave', (e) => { e.preventDefault(); e.stopPropagation(); inputWrapper.classList.remove('drag-over'); });
inputWrapper.addEventListener('drop', (e) => {
  e.preventDefault(); e.stopPropagation(); inputWrapper.classList.remove('drag-over');
  const files = e.dataTransfer?.files;
  if (!files) return;
  for (const file of files) {
    if (file.type === 'application/pdf' || file.name?.endsWith('.pdf')) {
      addPDFAndUpload(file);
    } else if (file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (ev) => addImageFromDataUrl(ev.target.result);
      reader.readAsDataURL(file);
    }
  }
});
inputBox.focus();
restoreChatHistory();

</script>
